document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n<style>\n:root {\n  --navy:        #080D1A;\n  --navy-2:      #0D1526;\n  --navy-3:      #111C30;\n  --navy-4:      #17243B;\n  --steel:       #1A5F8A;\n  --steel-mid:   #2278AC;\n  --steel-light: #3899CC;\n  --steel-glow:  rgba(34,120,172,0.18);\n  --ice:         #A8CDE0;\n  --white:       #FFFFFF;\n  --off-white:   #EEF3F7;\n  --muted:       #8A9BB0;\n  --faint:       #4A5A6E;\n  --gold:        #C8A96E;\n  --success:     #3DD68C;\n\n  --font-display: 'Bebas Neue', sans-serif;\n  --font-serif:   'DM Serif Display', serif;\n  --font-body:    'DM Sans', sans-serif;\n\n  --r-sm:   6px;\n  --r-md:   12px;\n  --r-lg:   20px;\n  --r-full: 9999px;\n}\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: var(--font-body);\n  background: var(--navy);\n  color: var(--off-white);\n  overflow-x: hidden;\n  line-height: 1.6;\n  font-size: 17px;\n}\nimg { max-width: 100%; display: block; }\na { text-decoration: none; color: inherit; }\n\n/* ── NAV ── */\nnav {\n  position: fixed;\n  top: 0; left: 0; right: 0;\n  z-index: 100;\n  padding: 16px 32px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  background: linear-gradient(to bottom, rgba(8,13,26,0.98) 0%, rgba(8,13,26,0) 100%);\n  transition: background 0.3s, padding 0.3s;\n}\nnav.scrolled {\n  background: rgba(8,13,26,0.97);\n  border-bottom: 1px solid rgba(34,120,172,0.2);\n  box-shadow: 0 4px 24px rgba(0,0,0,0.4);\n  padding: 12px 32px;\n}\n\n/* ── TYPOGRAPHY ── */\n.label {\n  font-family: var(--font-body);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--steel-light);\n}\nh1, h2 { font-family: var(--font-display); line-height: 1; letter-spacing: 0.02em; }\nh3 { font-family: var(--font-serif); font-weight: 400; line-height: 1.25; }\n\n/* ── LAYOUT ── */\n.container {\n  max-width: 1120px;\n  margin: 0 auto;\n  padding: 0 32px;\n}\n.container--narrow { max-width: 780px; margin: 0 auto; padding: 0 32px; }\n.container--tight  { max-width: 640px; margin: 0 auto; padding: 0 32px; }\n\n.section { padding: 96px 0; position: relative; }\n.section__header { text-align: center; max-width: 720px; margin: 0 auto 56px; }\n.section__header h2 {\n  font-size: clamp(2.6rem, 4.6vw, 4.6rem);\n  color: var(--white);\n  margin: 12px 0 20px;\n}\n.section__header p {\n  font-size: 19px;\n  color: var(--muted);\n  max-width: 560px;\n  margin: 0 auto;\n  line-height: 1.7;\n  font-weight: 300;\n}\n\n/* ── BUTTONS ── */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-body);\n  font-weight: 700;\n  font-size: 15px;\n  letter-spacing: 0.04em;\n  border-radius: var(--r-full);\n  border: none;\n  cursor: pointer;\n  transition: all 0.22s ease;\n  text-decoration: none;\n  white-space: nowrap;\n}\n.btn-primary {\n  background: var(--steel-mid);\n  color: var(--white);\n  padding: 16px 36px;\n  box-shadow: 0 0 30px rgba(34,120,172,0.3);\n}\n.btn-primary:hover {\n  background: var(--steel-light);\n  transform: translateY(-2px);\n  box-shadow: 0 0 50px rgba(56,153,204,0.45);\n}\n.btn-outline {\n  background: transparent;\n  color: var(--steel-light);\n  padding: 14px 32px;\n  border: 1.5px solid var(--steel-mid);\n}\n.btn-outline:hover {\n  background: var(--steel-glow);\n  border-color: var(--steel-light);\n}\n\n/* ── DIVIDER ── */\n.divider {\n  height: 1px;\n  background: linear-gradient(90deg, transparent, rgba(34,120,172,0.3), transparent);\n  max-width: 1120px;\n  margin: 0 auto;\n}\n\n/* ── SCROLL REVEAL ── */\n.reveal {\n  opacity: 0;\n  transform: translateY(32px);\n  transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);\n}\n.reveal.visible { opacity: 1; transform: translateY(0); }\n\n/* ════════════════════════════════════════\n   HERO\n════════════════════════════════════════ */\n.review-hero {\n  position: relative;\n  overflow: hidden;\n  padding: 150px 0 90px;\n  text-align: center;\n}\n.review-hero__bg {\n  position: absolute;\n  inset: 0;\n  z-index: 0;\n}\n.review-hero__bg::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background-image:\n    linear-gradient(rgba(34,120,172,0.06) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(34,120,172,0.06) 1px, transparent 1px);\n  background-size: 60px 60px;\n}\n.review-hero__bg::after {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(26,95,138,0.22) 0%, transparent 70%),\n              linear-gradient(180deg, rgba(8,13,26,0.4) 0%, rgba(8,13,26,0.85) 100%);\n}\n.review-hero__glow {\n  position: absolute;\n  width: 700px; height: 700px;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(34,120,172,0.13) 0%, transparent 70%);\n  top: -10%; left: 50%;\n  transform: translateX(-50%);\n  animation: glowPulse 8s ease-in-out infinite;\n  z-index: 0;\n}\n@keyframes glowPulse {\n  0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.7; }\n  50% { transform: translateX(-50%) scale(1.1); opacity: 1; }\n}\n.review-hero__inner {\n  position: relative;\n  z-index: 1;\n  max-width: 820px;\n  margin: 0 auto;\n  padding: 0 32px;\n}\n\n.review-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  background: rgba(200,169,110,0.08);\n  border: 1px solid rgba(200,169,110,0.3);\n  border-radius: var(--r-full);\n  padding: 10px 22px;\n  font-size: 12px;\n  font-weight: 700;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 32px;\n}\n.review-badge__dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--gold);\n}\n\n.review-hero h1 {\n  font-size: clamp(2.8rem, 5vw, 5.2rem);\n  color: var(--white);\n  line-height: 1;\n  margin-bottom: 20px;\n}\n.review-hero h1 .accent { color: var(--steel-light); }\n\n.review-hero__sub {\n  font-size: 18px;\n  color: var(--off-white);\n  line-height: 1.65;\n  font-weight: 300;\n  max-width: 620px;\n  margin: 16px auto 0;\n}\n.review-hero__signature {\n  margin-top: 36px;\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: 15px;\n  color: var(--muted);\n}\n.review-hero__signature strong { color: var(--off-white); font-style: normal; font-family: var(--font-body); font-weight: 600; }\n\n/* ════════════════════════════════════════\n   LETTER\n════════════════════════════════════════ */\n.letter {\n  background: var(--navy-2);\n  border-top: 1px solid rgba(34,120,172,0.12);\n  border-bottom: 1px solid rgba(34,120,172,0.12);\n}\n.letter__card {\n  background: var(--navy-3);\n  border: 1px solid rgba(34,120,172,0.2);\n  border-radius: var(--r-lg);\n  padding: 48px 56px;\n  max-width: 760px;\n  margin: 0 auto;\n  position: relative;\n  overflow: hidden;\n}\n.letter__card::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 2px;\n  background: linear-gradient(90deg, transparent, var(--steel-mid), transparent);\n}\n.letter__eyebrow {\n  font-family: var(--font-body);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--steel-light);\n  margin-bottom: 14px;\n}\n.letter__card h2 {\n  font-size: clamp(2rem, 3.4vw, 3.2rem);\n  color: var(--white);\n  margin-bottom: 24px;\n}\n.letter__body p {\n  font-size: 17px;\n  color: var(--off-white);\n  line-height: 1.75;\n  margin-bottom: 18px;\n  font-weight: 300;\n}\n.letter__body p:last-child { margin-bottom: 0; }\n.letter__body strong { color: var(--white); font-weight: 500; }\n\n/* ════════════════════════════════════════\n   BLUEPRINT CTA (the main next step)\n════════════════════════════════════════ */\n.blueprint {\n  position: relative;\n  overflow: hidden;\n  padding: 110px 0;\n}\n.blueprint__bg {\n  position: absolute; inset: 0; z-index: 0;\n  background:\n    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(34,120,172,0.14) 0%, transparent 70%);\n}\n.blueprint__inner {\n  position: relative;\n  z-index: 1;\n}\n.blueprint__card {\n  max-width: 920px;\n  margin: 0 auto;\n  background: linear-gradient(180deg, var(--navy-3) 0%, var(--navy-2) 100%);\n  border: 1px solid rgba(34,120,172,0.3);\n  border-radius: 24px;\n  padding: 60px 56px;\n  display: grid;\n  grid-template-columns: 1.1fr 0.9fr;\n  gap: 48px;\n  align-items: center;\n  position: relative;\n  overflow: hidden;\n  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 60px rgba(34,120,172,0.15);\n}\n.blueprint__card::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 3px;\n  background: linear-gradient(90deg, var(--steel), var(--steel-light), var(--steel));\n}\n.blueprint__eyebrow {\n  display: inline-block;\n  font-family: var(--font-body);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--steel-light);\n  margin-bottom: 18px;\n}\n.blueprint__card h2 {\n  font-size: clamp(2.4rem, 4vw, 3.6rem);\n  color: var(--white);\n  margin-bottom: 20px;\n}\n.blueprint__card h2 .accent { color: var(--steel-light); }\n.blueprint__card > .blueprint__col > p {\n  font-size: 16px;\n  color: var(--muted);\n  line-height: 1.7;\n  margin-bottom: 28px;\n  font-weight: 300;\n}\n.blueprint__list {\n  list-style: none;\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  margin-bottom: 36px;\n}\n.blueprint__list li {\n  display: flex;\n  align-items: flex-start;\n  gap: 12px;\n  font-size: 15px;\n  color: var(--off-white);\n  line-height: 1.5;\n  font-weight: 400;\n}\n.blueprint__list li svg {\n  flex-shrink: 0;\n  margin-top: 3px;\n  color: var(--success);\n}\n\n.blueprint__visual {\n  position: relative;\n  aspect-ratio: 3 / 4;\n  border-radius: var(--r-lg);\n  overflow: hidden;\n  background: var(--navy-4);\n  border: 1px solid rgba(34,120,172,0.25);\n  box-shadow: 0 18px 48px rgba(0,0,0,0.5);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 28px;\n}
